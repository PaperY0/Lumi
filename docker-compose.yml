services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      ALLOWED_ORIGINS: http://localhost:8080,http://localhost:5173,http://localhost:5174
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AI_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - backend
